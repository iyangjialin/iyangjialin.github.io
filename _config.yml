# Site
title: iyangjialin 的博客
subtitle: '记录学习与生活'
description: '一个技术博客'
author: iyangjialin
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://iyangjialin.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
date_formatISO: YYYY-MM-DDTHH:mm:ssZ
use_date_for_updated: false

# Pagination
per_page: 10
pagination_dir: page
# Website verification
# google_site_verification:
# bing_site_verification:
# yandex_site_verification:

# Theme
theme: landscape

# Deployment
deploy:
  type: git
  repo: https://github.com/iyangjialin/iyangjialin.github.io.git
  branch: gh-pages
