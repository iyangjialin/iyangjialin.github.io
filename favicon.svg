<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Letter T -->
  <g fill="url(#accent)">
    <!-- T horizontal bar -->
    <rect x="96" y="120" width="320" height="56" rx="12"/>
    <!-- T vertical stem -->
    <rect x="228" y="176" width="56" height="272" rx="12"/>
    <!-- Circuit dots -->
    <circle cx="156" cy="148" r="14" fill="#1a1a2e"/>
    <circle cx="356" cy="148" r="14" fill="#1a1a2e"/>
    <circle cx="256" cy="380" r="14" fill="#1a1a2e"/>
    <!-- Circuit lines -->
    <path d="M156 148 L116 108" stroke="#00d4ff" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M356 148 L396 108" stroke="#00d4ff" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M256 380 L256 420 L296 420" stroke="#00d4ff" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
